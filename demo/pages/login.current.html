<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MyApp — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: white; border-radius: 12px; padding: 40px; width: 400px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    h1 { font-size: 24px; margin-bottom: 8px; color: #111; }
    p  { font-size: 14px; color: #666; margin-bottom: 28px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #333; margin-bottom: 6px; }
    input  { width: 100%; padding: 10px 14px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; margin-bottom: 16px; }
    input:focus { border-color: #4f46e5; }
    /* Developer rename class dari btn-login jadi btn-primary (ikut design system baru) */
    .btn-primary { width: 100%; padding: 12px; background: #4f46e5; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
    .btn-primary:hover { background: #4338ca; }
    .forgot { text-align: center; margin-top: 16px; font-size: 13px; color: #666; }
    .forgot a { color: #4f46e5; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Welcome back</h1>
    <p>Sign in to your account to continue.</p>

    <!--
      PERUBAHAN TIDAK DISENGAJA oleh developer:

      1. id="loginbtn"  →  id="loginBtn"       (typo casing — test pakai #loginbtn)
      2. class="btn-login"  →  class="btn-primary"  (ikut design system baru)
      3. data-testid="login-submit-btn"  →  data-testid="submit-btn"  (typo, potong prefix)
      4. input username: id="username"  →  id="usernameField"  (developer refactor)

      Fitur login MASIH BERJALAN NORMAL.
      Tapi 4 locator automation test akan GAGAL.
    -->

    <form id="login-form" action="/auth/login" method="POST">

      <label for="usernameField">Username</label>
      <input
        id="usernameField"
        name="username"
        type="text"
        placeholder="Enter your username"
        data-testid="login-username-input"
        autocomplete="username"
      />

      <label for="password">Password</label>
      <input
        id="password"
        name="password"
        type="password"
        placeholder="Enter your password"
        data-testid="login-password-input"
        autocomplete="current-password"
      />

      <button
        id="loginbtn"
        name="submit-login"
        type="submit"
        class="btn-login"
        data-testid="login-submit-btn"
        aria-label="Sign in"
      >
        Sign In
      </button>

    </form>

    <div class="forgot">
      <a id="forgot-password-link" href="/forgot-password">Forgot password?</a>
    </div>
  </div>
</body>
</html>
